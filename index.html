<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Wallpapers Pro - Creatus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5f3ff;
            color: #4c1d95;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.4rem;
            margin: 5px 0 10px 0;
            text-align: center;
            background: linear-gradient(45deg, #6d28d9, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Contenedor del lienzo interactivo */
        .canvas-container {
            width: 100%;
            max-width: 320px;
            aspect-ratio: 9 / 16;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            border: 3px solid white;
        }

        #wallpaperCanvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        .controls {
            width: 100%;
            max-width: 320px;
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.08);
            max-height: 48vh;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin: 12px 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6d28d9;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        /* Grid de Paletas */
        .palette-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .palette-btn {
            display: flex;
            height: 35px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            overflow: hidden;
        }

        .palette-btn.active {
            border-color: #4c1d95;
        }

        .color-block {
            flex: 1;
            height: 100%;
        }

        /* Grid de Emojis */
        .emoji-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .emoji-btn {
            background: #f3f4f6;
            border: none;
            font-size: 1.4rem;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Herramientas de texto y tamańo */
        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f9f8ff;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .input-text {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd6fe;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: space-between;
        }

        .slider {
            flex: 1;
            accent-color: #6d28d9;
        }

        .color-picker {
            border: none;
            width: 40px;
            height: 30px;
            border-radius: 5px;
            cursor: pointer;
            background: none;
        }

        .btn-action {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 5px;
        }

        .btn-download {
            display: block;
            width: 100%;
            background: linear-gradient(45deg, #6d28d9, #4f46e5);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1> Creador de Wallpapers Studio</h1>

    <div class="canvas-container">
        <canvas id="wallpaperCanvas"></canvas>
    </div>

    <div class="controls">
        <p class="section-title"> 1. Fondo</p>
        <div class="palette-container">
            <button class="palette-btn active" onclick="setGradient('#f5f3ff', '#fbcfe8', this)">
                <div class="color-block" style="background-color: #f5f3ff;"></div>
                <div class="color-block" style="background-color: #fbcfe8;"></div>
            </button>
            <button class="palette-btn" onclick="setGradient('#ffedd5', '#fecdd3', this)">
                <div class="color-block" style="background-color: #ffedd5;"></div>
                <div class="color-block" style="background-color: #fecdd3;"></div>
            </button>
            <button class="palette-btn" onclick="setGradient('#e0e7ff', '#c7d2fe', this)">
                <div class="color-block" style="background-color: #e0e7ff;"></div>
                <div class="color-block" style="background-color: #c7d2fe;"></div>
            </button>
            <button class="palette-btn" onclick="setGradient('#ecfccb', '#ccfbf1', this)">
                <div class="color-block" style="background-color: #ecfccb;"></div>
                <div class="color-block" style="background-color: #ccfbf1;"></div>
            </button>
        </div>

        <p class="section-title"> 2. Tamańo del elemento</p>
        <div class="row" style="background: #f9f8ff; padding: 8px; border-radius: 10px;">
            <input type="range" id="sizeSlider" class="slider" min="20" max="120" value="50">
        </div>

        <p class="section-title"> 3. Toca para estampar Emojis</p>
        <div class="emoji-container">
            <button class="emoji-btn" onclick="selectEmoji('&#x2764;&#xFE0F;')">&#x2764;&#xFE0F;</button>
            <button class="emoji-btn" onclick="selectEmoji('&#x1F499;')">&#x1F499;</button>
            <button class="emoji-btn" onclick="selectEmoji('&#x1F49C;')">&#x1F49C;</button>
            <button class="emoji-btn" onclick="selectEmoji('&#x1F525;')">&#x1F525;</button>
            <button class="emoji-btn" onclick="selectEmoji('&#x2728;')">&#x2728;</button>
            <button class="emoji-btn" onclick="selectEmoji('&#x1F33B;')">&#x1F33B;</button>
            <button class="emoji-btn" onclick="selectEmoji('&#x1F352;')">&#x1F352;</button>
            <button class="emoji-btn" onclick="selectEmoji('&#x1F349;')">&#x1F349;</button>
            <button class="emoji-btn" onclick="selectEmoji('&#x1F9C9;')">&#x1F9C9;</button>
            <button class="emoji-btn" onclick="selectEmoji('&#x1F431;')">&#x1F431;</button>
        </div>

        <p class="section-title"> 4. Agregar Texto</p>
        <div class="tool-group">
            <input type="text" id="textInput" class="input-text" placeholder="Escribí algo lindo...">
            <div class="row">
                <label style="font-size: 0.85rem;">Color texto:</label>
                <input type="color" id="textColor" class="color-picker" value="#4c1d95">
                <button style="background: #6d28d9; color:white; border:none; padding: 6px 12px; border-radius:6px; font-size:0.8rem; cursor:pointer;" onclick="addText()">Poner Texto</button>
            </div>
        </div>

        <button class="btn-action" onclick="clearCanvas()">Borrar todo y empezar de nuevo</button>
        <button class="btn-download" onclick="downloadWallpaper()">Descargar Fondo (HD)</button>
    </div>

    <script>
        const canvas = document.getElementById('wallpaperCanvas');
        const ctx = canvas.getContext('2d');
        const sizeSlider = document.getElementById('sizeSlider');
        const textInput = document.getElementById('textInput');
        const textColor = document.getElementById('textColor');

        let currentGrad = { c1: '#f5f3ff', c2: '#fbcfe8' };
        let activeEmoji = null;
        let elements = []; // Guarda todo lo que agregás

        // Ajustamos la resolución real del lienzo para que no se vea borroso
        function initCanvas() {
            canvas.width = 1080;
            canvas.height = 1920;
            draw();
        }

        function draw() {
            // 1. Dibujar fondo
            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, currentGrad.c1);
            gradient.addColorStop(1, currentGrad.c2);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Dibujar todos los elementos guardados (emojis y textos)
            elements.forEach(el => {
                ctx.save();
                if (el.type === 'emoji') {
                    ctx.font = `${el.size * 2.5}px sans-serif`; // Multiplicador por alta resolución
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(el.content, el.x, el.y);
                } else if (el.type === 'text') {
                    ctx.font = `bold ${el.size * 2}px sans-serif`;
                    ctx.fillStyle = el.color;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(el.content, el.x, el.y);
                }
                ctx.restore();
            });
        }

        function setGradient(color1, color2, btn) {
            currentGrad = { c1: color1, c2: color2 };
            document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            draw();
        }

        function selectEmoji(emojiCode) {
            activeEmoji = emojiCode;
            textInput.value = ''; // Desactiva texto si elegís emoji
        }

        function addText() {
            if(textInput.value.trim() !== "") {
                activeEmoji = null; // Desactiva emoji si vas a poner texto
                // Lo ubica en el centro por defecto para que después lo muevas o quede ahí
                elements.push({
                    type: 'text',
                    content: textInput.value,
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    size: parseInt(sizeSlider.value),
                    color: textColor.value
                });
                draw();
            }
        }

        // Detectar toques en el cuadro para estampar el emoji
        canvas.addEventListener('click', handleAction);
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            let touch = e.touches[0];
            let mouseEvent = new MouseEvent("click", {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        }, { passive: false });

        function handleAction(e) {
            let rect = canvas.getBoundingClientRect();
            // Calcular posición real dentro de la alta resolución del canvas
            let scaleX = canvas.width / rect.width;
            let scaleY = canvas.height / rect.height;
            
            let clickX = (e.clientX - rect.left) * scaleX;
            let clickY = (e.clientY - rect.top) * scaleY;

            if (activeEmoji) {
                elements.push({
                    type: 'emoji',
                    content: activeEmoji,
                    x: clickX,
                    y: clickY,
                    size: parseInt(sizeSlider.value)
                });
                draw();
            } else {
                // Si no hay emoji seleccionado, mover el último texto al lugar donde tocaste
                let lastText = [...elements].reverse().find(el => el.type === 'text');
                if (lastText) {
                    lastText.x = clickX;
                    lastText.y = clickY;
                    draw();
                }
            }
        }

        function clearCanvas() {
            elements = [];
            activeEmoji = null;
            textInput.value = '';
            draw();
        }

        function downloadWallpaper() {
            // Genera la descarga real de la imagen en alta definición 1080x1920
            const image = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = 'creatus-wallpaper.png';
            link.href = image;
            link.click();
        }

        // Arrancar
        window.onload = initCanvas;
    </script>

</body>
</html>
