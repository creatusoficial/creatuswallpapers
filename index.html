<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Fondos - Creatus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5f3ff;
            color: #4c1d95;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.6rem;
            margin: 10px 0;
            text-align: center;
            background: linear-gradient(45deg, #6d28d9, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .preview-card {
            width: 100%;
            max-width: 360px;
            aspect-ratio: 9 / 16;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            transition: background 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 4px solid white;
        }

        .controls {
            width: 100%;
            max-width: 360px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.08);
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6d28d9;
        }

        .palette-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .palette-btn {
            display: flex;
            height: 45px;
            border-radius: 10px;
            border: 2px solid transparent;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.1s ease;
        }

        .palette-btn:active {
            transform: scale(0.95);
        }

        .palette-btn.active {
            border-color: #4c1d95;
            box-shadow: 0 0 0 2px #c084fc;
        }

        .color-block {
            flex: 1;
            height: 100%;
        }

        .btn-download {
            display: block;
            width: 100%;
            background: linear-gradient(45deg, #6d28d9, #4f46e5);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 12px rgba(109, 40, 217, 0.2);
            transition: background 0.2s;
        }

        .btn-download:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h1> Creador de Wallpapers</h1>

    <div class="preview-card" id="wallpaperPreview"></div>

    <div class="controls">
        <p class="section-title"> Seleccioná tu Paleta de Colores</p>
        
        <div class="palette-container">
            <button class="palette-btn active" onclick="changeGradient('#f5f3ff', '#fbcfe8', this)">
                <div class="color-block" style="background-color: #f5f3ff;"></div>
                <div class="color-block" style="background-color: #fbcfe8;"></div>
            </button>

            <button class="palette-btn" onclick="changeGradient('#ffedd5', '#fecdd3', this)">
                <div class="color-block" style="background-color: #ffedd5;"></div>
                <div class="color-block" style="background-color: #fecdd3;"></div>
            </button>

            <button class="palette-btn" onclick="changeGradient('#e0e7ff', '#c7d2fe', this)">
                <div class="color-block" style="background-color: #e0e7ff;"></div>
                <div class="color-block" style="background-color: #c7d2fe;"></div>
            </button>

            <button class="palette-btn" onclick="changeGradient('#ecfccb', '#ccfbf1', this)">
                <div class="color-block" style="background-color: #ecfccb;"></div>
                <div class="color-block" style="background-color: #ccfbf1;"></div>
            </button>
        </div>

        <button class="btn-download" onclick="downloadNotice()">Descargar Fondo</button>
    </div>

    <script>
        const preview = document.getElementById('wallpaperPreview');
        
        // Configuración inicial
        preview.style.background = "linear-gradient(135deg, #f5f3ff 0%, #fbcfe8 100%)";

        function changeGradient(color1, color2, element) {
            // Cambiar fondo
            preview.style.background = `linear-gradient(135deg, ${color1} 0%, ${color2} 100%)`;
            
            // Cambiar botón activo
            document.querySelectorAll('.palette-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        function downloadNotice() {
            alert('ˇTu fondo personalizado está listo! Mantené presionada la pantalla de vista previa para guardarla como imagen (Próximamente descarga automática).');
        }
    </script>

</body>
</html>
