<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador Creatus</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; padding: 10px; }
        .canvas-container { width: 300px; height: 533px; background: white; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #canvas { width: 100%; height: 100%; }
        .controls { width: 300px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        button { padding: 10px; border: none; border-radius: 5px; background: white; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="canvas-container">
    <canvas id="canvas" width="300" height="533"></canvas>
</div>

<div class="controls" id="emojiGrid"></div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const emojis = ['🍇', '🍒', '🍓', '🍉', '🍰', '🧁', '🍪', '🍩', '🍷', '🧉', '🌙', '☀️', '✨', '🔥', '🌻', '💋', '🫶🏻', '🤘🏻', '❤️', '🦋'];
    
    // Dibujar fondo fijo inicial
    ctx.fillStyle = '#ffb3b3';
    ctx.fillRect(0, 0, 300, 533);

    const grid = document.getElementById('emojiGrid');
    emojis.forEach(e => {
        let btn = document.createElement('button');
        btn.innerText = e;
        btn.onclick = () => {
            // Dibujamos el emoji directamente como texto, pero asegurando el contexto
            ctx.font = '50px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(e, Math.random() * 250 + 25, Math.random() * 480 + 25);
        };
        grid.appendChild(btn);
    });
</script>
</body>
</html>
