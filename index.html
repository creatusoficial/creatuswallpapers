<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Fondos - Creatus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5f3ff;
            color: #4c1d95;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.6rem;
            margin: 10px 0;
            text-align: center;
            background: linear-gradient(45deg, #6d28d9, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .preview-card {
            width: 100%;
            max-width: 340px;
            aspect-ratio: 9 / 16;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border: 4px solid white;
            transition: background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #emojiDisplay {
            font-size: 5.5rem;
            transition: transform 0.2s ease;
            user-select: none;
        }

        .controls {
            width: 100%;
            max-width: 340px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.08);
            max-height: 45vh;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 15px 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6d28d9;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        /* Contenedor de Paletas */
        .palette-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .palette-btn {
            display: flex;
            height: 40px;
            border-radius: 10px;
            border: 2px solid transparent;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .palette-btn.active {
            border-color: #4c1d95;
            box-shadow: 0 0 0 2px #c084fc;
        }

        .color-block {
            flex: 1;
            height: 100%;
        }

        /* Contenedor de Emojis */
        .emoji-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .emoji-btn {
            background: #f3f4f6;
            border: none;
            font-size: 1.6rem;
            padding: 8px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .emoji-btn:active {
            transform: scale(0.85);
            background: #e5e7eb;
        }

        .emoji-btn.active {
            background: #ddd6fe;
            box-shadow: 0 0 0 2px #a78bfa;
        }

        .btn-download {
            display: block;
            width: 100%;
            background: linear-gradient(45deg, #6d28d9, #4f46e5);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 12px rgba(109, 40, 217, 0.2);
            position: sticky;
            bottom: 0;
        }
    </style>
</head>

    <script>
        const preview = document.getElementById('wallpaperPreview');
        const emojiDisplay = document.getElementById('emojiDisplay');
        
        preview.style.background = "linear-gradient(135deg, #f5f3ff 0%, #fbcfe8 100%)";

        function changeGradient(color1, color2, element) {
            preview.style.background = `linear-gradient(135deg, ${color1} 0%, ${color2} 100%)`;
            document.querySelectorAll('.palette-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        function changeEmoji(emoji, element) {
            emojiDisplay.innerText = emoji;
            document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }
